<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>SHMRY Sovereign Cloud</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0b1020; color:#e8eefc; padding:30px; }
    h1 { color:#70e1ff; }
    .card { background:#151d35; padding:20px; border-radius:14px; margin:15px 0; }
    button { padding:10px 14px; border:0; border-radius:8px; cursor:pointer; }
    pre { background:#050814; padding:15px; border-radius:10px; overflow:auto; }
  </style>
</head>
<body>
  <h1>SHMRY Sovereign Cloud</h1>
  <p>User Portal + API Gateway</p>

  <div class="card">
    <h2>Platform Status</h2>
    <button onclick="load('/api/health')">Check Health</button>
  </div>

  <div class="card">
    <h2>Customers</h2>
    <button onclick="load('/api/customers')">Load Customers</button>
  </div>

  <div class="card">
    <h2>Instances</h2>
    <button onclick="load('/api/instances')">Load Instances</button>
  </div>

  <div class="card">
    <h2>Dashboard</h2>
    <button onclick="load('/api/dashboard')">Load Dashboard</button>
  </div>

  <pre id="out">Ready.</pre>

<script>
async function load(path) {
  const res = await fetch(path);
  const data = await res.json();
  document.getElementById("out").textContent = JSON.stringify(data, null, 2);
}
</script>
</body>
</html>
